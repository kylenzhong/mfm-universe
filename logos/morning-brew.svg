<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <rect width="512" height="512" fill="#1a0c06"/>
  <!-- Coffee mug -->
  <rect x="136" y="220" width="220" height="200" rx="18" fill="#4a2c1a"/>
  <rect x="152" y="236" width="188" height="168" rx="12" fill="#3a1e0e"/>
  <!-- Handle -->
  <path d="M356,260 Q420,285 420,340 Q420,395 356,400" fill="none" stroke="#4a2c1a" stroke-width="28" stroke-linecap="round"/>
  <!-- Steam wisps -->
  <path d="M190,195 Q200,155 190,120" fill="none" stroke="#8b6358" stroke-width="8" stroke-linecap="round"/>
  <path d="M246,182 Q256,142 246,107" fill="none" stroke="#8b6358" stroke-width="8" stroke-linecap="round"/>
  <path d="M302,195 Q312,155 302,120" fill="none" stroke="#8b6358" stroke-width="8" stroke-linecap="round"/>
  <!-- M on mug -->
  <text x="246" y="360" text-anchor="middle" font-family="Arial Black,sans-serif" font-size="80" font-weight="900" fill="#d4956a">M</text>
  <!-- Name -->
  <text x="256" y="462" text-anchor="middle" font-family="Arial Black,sans-serif" font-size="30" font-weight="900" fill="#d4956a" letter-spacing="1">Morning Brew</text>
</svg>
function hx(c){return new THREE.Color(c)}
function bx(w,h,d,col){
  var m=new THREE.Mesh(new THREE.BoxGeometry(w,h,d),new THREE.MeshLambertMaterial({color:hx(col)}));

function lerp(a,b,t){return a+(b-a)*t}
function ss(t){return t*t*(3-2*t)}
function eOB(t){var c=1.70158;return 1+(c+1)*Math.pow(t-1,3)+c*Math.pow(t-1,2)}
function eOE(t){if(t===0||t===1)return t;return Math.pow(2,-10*t)*Math.sin((t*10-.75)*(2*Math.PI/3))+1}
function clamp01(t){return Math.max(0,Math.min(1,t))}

/* ─── FACADE TEXTURE — aspect-ratio-matched canvas ─── */
function makeFacade(lines,bg,accent,faceW,faceH){
  var maxPx=1024;
  var cw,ch;
  if(faceH>=faceW){ch=maxPx;cw=Math.max(256,Math.round(maxPx*faceW/faceH))}
  else{cw=maxPx;ch=Math.max(256,Math.round(maxPx*faceH/faceW))}
  var fS=cw/1024; // font scale

  var cvs=document.createElement('canvas');
  cvs.width=cw;cvs.height=ch;
  var ctx=cvs.getContext('2d');

  // BG
  ctx.fillStyle=bg;ctx.fillRect(0,0,cw,ch);
  ctx.fillStyle='rgba(255,255,255,0.02)';
  for(var y=0;y<ch;y+=20)ctx.fillRect(0,y,cw,1);

  // Windows (bottom 42%)
  var wT=ch*0.58,rows=6,cols=5;
  var cellW=(cw-24)/cols,cellH=(ch-wT-12)/rows;
  var ww=cellW*0.50,wh=cellH*0.52;
  for(var r=0;r<rows;r++)for(var c=0;c<cols;c++){
    var lit=Math.random()>0.20;
    var wx=12+c*cellW+(cellW-ww)/2,wy=wT+r*cellH+(cellH-wh)/2;
    if(lit){
      var g=ctx.createRadialGradient(wx+ww/2,wy+wh/2,0,wx+ww/2,wy+wh/2,ww*.9);
      g.addColorStop(0,'rgba(255,240,180,0.85)');g.addColorStop(1,'rgba(200,180,80,0.45)');
      ctx.fillStyle=g;
    }else ctx.fillStyle='rgba(80,120,180,0.12)';
    ctx.fillRect(wx,wy,ww,wh);
  }

  // Accent strips
  ctx.fillStyle=accent;ctx.fillRect(0,0,cw,Math.max(3,4*fS));
  ctx.fillRect(0,ch*0.555,cw,Math.max(2,3*fS));

  // Brand text (top 55%)
  var totalH=0;
  lines.forEach(function(l){totalH+=Math.round((l.fs||60)*fS)+Math.round(8*fS)});
  var curY=Math.max(6,(ch*0.54-totalH)/2+4);

  lines.forEach(function(l){
    var fs=Math.round((l.fs||60)*fS);
    var gap=Math.round(8*fS);
    ctx.font=(l.bold!==false?'900':'400')+' '+fs+'px Arial Black,Impact,Arial';
    ctx.fillStyle=l.color||accent;
    ctx.textAlign='center';ctx.textBaseline='top';
    ctx.shadowColor='rgba(0,0,0,0.55)';ctx.shadowBlur=8*fS;
    ctx.fillText(l.text,cw/2,curY);
    ctx.shadowBlur=0;
    curY+=fs+gap;
  });

  return new THREE.CanvasTexture(cvs);
}

/* ─── BUILDING FACTORY ─── */
function buildingGroup(cfg){
  var g=new THREE.Group();
  var bw=cfg.w||10,bd=cfg.d||10,bh=cfg.h||16;

  var body=bx(bw,bh,bd,cfg.bodyColor);
  body.position.y=bh/2;g.add(body);

  // Front facade (+Z) — MeshBasicMaterial for always-readable logos
  var ft=makeFacade(cfg.logo,cfg.bodyColor,cfg.accentColor,bw,bh);
  var ff=new THREE.Mesh(new THREE.PlaneGeometry(bw-0.2,bh-0.2),
    new THREE.MeshBasicMaterial({map:ft}));
  ff.position.set(0,bh/2,bd/2+0.02);g.add(ff);

  // Side facade (+X)
  var sl=cfg.logo[1]?cfg.logo[1].text:cfg.logo[0].text;
  var st=makeFacade([{text:sl,fs:48,color:cfg.accentColor}],cfg.bodyColor,cfg.accentColor,bd,bh*0.8);
  var sf=new THREE.Mesh(new THREE.PlaneGeometry(bd-0.2,bh*0.8-0.2),
    new THREE.MeshBasicMaterial({map:st}));
  sf.rotation.y=Math.PI/2;sf.position.set(bw/2+0.02,bh*0.45,0);g.add(sf);

  // Roof + parapet
  var roof=bx(bw+0.4,0.5,bd+0.4,cfg.roofColor||'#555');
  roof.position.y=bh+0.25;g.add(roof);
  var par=bx(bw+0.5,0.7,0.25,cfg.bodyColor);
  par.position.set(0,bh+0.35,bd/2+0.3);g.add(par);

  if(cfg.antenna){
    var ant=bx(0.15,cfg.antenna,0.15,'#aaa');ant.position.y=bh+cfg.antenna/2+0.5;g.add(ant);
    var bl=new THREE.Mesh(new THREE.SphereGeometry(0.22,8,8),new THREE.MeshBasicMaterial({color:0xff2222}));
    bl.position.y=bh+cfg.antenna+0.72;bl._blink=true;g.add(bl);
  }
  if(cfg.rooftopDetail){
    var ac=bx(bw*0.3,1.5,bd*0.3,'#888');ac.position.set(bw*0.2,bh+1.25,-bd*0.15);g.add(ac);
  }

  g._h=bh;g._body=body;
  return g;
}

/* ─── HOT AIR BALLOON FACTORY ─── */
function createBalloon(name,col1,col2,logoEmoji){
  var g=new THREE.Group();

  // Envelope — sphere with branded texture
  var ec=document.createElement('canvas');
  ec.width=512;ec.height=512;
  var ex=ec.getContext('2d');
  // Vertical stripes
  var sw=512/8;
  for(var i=0;i<8;i++){ex.fillStyle=i%2===0?col1:col2;ex.fillRect(i*sw,0,sw,512)}
  // Horizontal band with name
  ex.fillStyle='rgba(255,255,255,0.85)';
  ex.fillRect(0,190,512,132);
  ex.font='900 52px Arial Black';ex.fillStyle=col1;
  ex.textAlign='center';ex.textBaseline='middle';
  ex.fillText(name,256,256);
  // Emoji above
  ex.font='72px Arial';ex.fillText(logoEmoji,256,140);

  var envTex=new THREE.CanvasTexture(ec);
  var envelope=new THREE.Mesh(
    new THREE.SphereGeometry(4.5,20,16),
    new THREE.MeshLambertMaterial({map:envTex})
  );
  envelope.scale.y=1.3;
  envelope.position.y=9;
  g.add(envelope);

  // Basket
  var basket=bx(2,1.2,2,'#8B4513');basket.position.y=0.6;g.add(basket);
  var rim=bx(2.2,0.2,2.2,'#6B3010');rim.position.y=1.3;g.add(rim);

  // Ropes
  for(var r=0;r<4;r++){
    var a=(r/4)*Math.PI*2+Math.PI/4;
    var rope=bx(0.06,6.2,0.06,'#aa8844');
    rope.position.set(Math.cos(a)*0.8,4.5,Math.sin(a)*0.8);
    g.add(rope);
  }

  // Flame glow (small orange light)
  var flame=new THREE.PointLight(0xff6600,0.8,12);
  flame.position.y=2.5;
  g.add(flame);

  return g;
}

    var d=bx(0.12,0.10,1.8,'#e0d040');d.position.set(0,0.08,-l/2+2.5+i*5);g.add(d);
  }
  g.rotation.y=rY;g.position.set(x,0,z);scene.add(g);
}

function mkLetTex(ch,bg,fg){

  x.fillStyle='rgba(255,255,255,0.04)';

  x.textAlign='center';x.textBaseline='middle';
  x.shadowColor='rgba(0,0,0,0.4)';x.shadowBlur=12;
  x.fillText(ch,128,134);
  return new THREE.CanvasTexture(c);
}
function extText(text,sz,dp,col,cx,bY,cz){
  var lw=sz*0.68,sp=sz*0.80;
  var tot=(text.length-1)*sp,sx=cx-tot/2,idx=0;
  text.split('').forEach(function(ch){
    if(ch===' '){idx++;return}
    var lx=sx+idx*sp;
    var blk=bx(lw,sz,dp,col);blk.position.set(lx,bY+sz/2,cz);blk.castShadow=true;scene.add(blk);
    var ft=new THREE.Mesh(new THREE.PlaneGeometry(lw*0.88,sz*0.88),
      new THREE.MeshBasicMaterial({map:mkLetTex(ch,col,'#ffffff')}));
    ft.position.set(lx,bY+sz/2,cz+dp/2+0.02);scene.add(ft);
    var tp=new THREE.Mesh(new THREE.PlaneGeometry(lw,dp),new THREE.MeshLambertMaterial({color:hx('#ee2200')}));
    tp.rotation.x=-Math.PI/2;tp.position.set(lx,bY+sz+0.01,cz);scene.add(tp);
    idx++;
  });
}

function cLerp(kf,t){
  for(var i=0;i<kf.length-1;i++){
    if(t>=kf[i].t&&t<=kf[i+1].t){
      var u=(t-kf[i].t)/(kf[i+1].t-kf[i].t),s=ss(u);
      return{
        p:kf[i].p.map(function(v,j){return v+(kf[i+1].p[j]-v)*s}),
        l:kf[i].l.map(function(v,j){return v+(kf[i+1].l[j]-v)*s})
      };
    }
  }
  return kf[kf.length-1];
}

/* ═══════════════════════════════════════════════
   ANIMATION SYSTEM
═══════════════════════════════════════════════ */
var blT=0,hA=0,clk=new THREE.Clock();
var hubCol=new THREE.Color('#FF7A59');

// Balloon starting positions — lowered so they're fully visible
var hbS=[-26,30,-38]; // hustle balloon start
var bbS=[-8,30,-38];  // brew balloon start
var hubP=CO.hubspot.pos;

var bRadius=5.0; // balloon envelope radius for collision
function updateBalloons(t){
  var hx,hy,hz,bx2,by,bz;

  /* Phase 1: drift toward each other (0–6s) */
  if(t<6){
    var drift=t/6; // 0→1
    hx=hbS[0]+drift*7+Math.sin(t*0.6)*2;
    hy=hbS[1]+Math.sin(t*0.8)*2;
    hz=hbS[2]+Math.cos(t*0.5)*2;
    bx2=bbS[0]-drift*7+Math.sin(t*0.7+1)*2;
    by=bbS[1]+Math.sin(t*0.9+0.5)*2;
    bz=bbS[2]+Math.cos(t*0.4+1)*2;
  }
  /* Phase 2: bump & bounce repeatedly (6–12s) */
  else if(t<12){
    var bt=(t-6)/6;
    var cx=(hbS[0]+bbS[0])/2;
    // Oscillate around center but enforce minimum separation
    var osc=Math.sin(bt*Math.PI*4)*5*(1-bt*0.5);
    hx=cx-2-osc+Math.sin(t*0.4)*1;
    hy=30+Math.sin(t*0.7)*2;
    hz=hbS[2]+Math.cos(t*0.3)*2;
    bx2=cx+2+osc+Math.sin(t*0.5+1)*1;
    by=30+Math.sin(t*0.8+0.5)*2;
    bz=bbS[2]+Math.cos(t*0.4+1)*2;
  }
  /* Phase 3: Hustle descends to HubSpot, Brew floats away (12–18s) */
  else if(t<18){
    var dt2=clamp01((t-12)/6);
    var ds=ss(dt2);
    hx=lerp(hbS[0]+7,hubP[0],ds)+Math.sin(t*0.3)*(1-ds)*2;
    hy=lerp(30,CO.hubspot.h+5,ds);
    hz=lerp(hbS[2],hubP[2],ds)+Math.cos(t*0.3)*(1-ds)*2;
    if(dt2>0.7) hustleBalloon.scale.setScalar(1-clamp01((dt2-0.7)/0.3));
    bx2=bbS[0]-7+ds*35+Math.sin(t*0.5)*2;
    by=30+ds*18;
    bz=bbS[2]+ds*20;
    hustleBalloon.position.set(hx,hy,hz);
    brewBalloon.position.set(bx2,by,bz);
    return;
  }
  /* Phase 4: balloons done */
  else{
    hustleBalloon.visible=false;
    brewBalloon.position.y+=0.015;
    brewBalloon.position.x+=0.02;
    if(brewBalloon.position.y>80)brewBalloon.visible=false;
    return;
  }

  // Collision enforcement: push apart if too close
  var dx=bx2-hx,dz=bz-hz;
  var dist=Math.sqrt(dx*dx+dz*dz);
  var minD=bRadius*2;
  if(dist<minD&&dist>0.01){
    var push=(minD-dist)/2;
    var nx=dx/dist,nz=dz/dist;
    hx-=nx*push; hz-=nz*push;
    bx2+=nx*push; bz+=nz*push;
  }

  hustleBalloon.position.set(hx,hy,hz);
  brewBalloon.position.set(bx2,by,bz);
}

function updateStory(t){
  /* Balloons */
  updateBalloons(t);

  /* HubSpot grows after acquiring Hustle balloon (12–17s) */
  if(t>=12&&t<=17){
    var p=clamp01((t-12)/5),s=ss(p);

    // HubSpot grows bigger
    G.hubspot.scale.y=1+s*0.45;
    G.hubspot.scale.x=1+s*0.10;
    G.hubspot.scale.z=1+s*0.10;
  }

  /* Hampton pops up alongside HubSpot (14–17.5s) */
  if(t>14){
    var ht=clamp01((t-14)/3.5);
    G.hampton.scale.y=eOB(ht);
  }

  /* Morning Brew gets its building after Hustle absorbed (17–20s) */
  if(t>17){
    var bt=clamp01((t-17)/3);
    G.brew.scale.y=eOB(bt);
  }

  /* Jesse Itzler cluster pops up (8–15s, staggered) */
  var itzlerBuildings=[{k:'zico',st:8},{k:'bigcal',st:9.5},{k:'mile100',st:11},{k:'evt29029',st:12.5}];
  itzlerBuildings.forEach(function(ib){
    if(t>ib.st){
      var it=clamp01((t-ib.st)/2);
      G[ib.k].scale.y=eOB(it);
    }
  });

  /* Milk Road exit pulse (18–22s) */
  if(t>=18&&t<=22){
    var mp=clamp01((t-18)/4),ms=ss(mp);
    G.milkroad.scale.y=1+Math.sin(t*4)*0.04*ms;
  }

  /* Cal AI pops up fast (23–25s) */
  if(t>23&&t<=25){
    var ct=clamp01((t-23)/2);
    G.calai.scale.y=eOB(ct);
    G.calai.scale.x=1;
    G.calai.scale.z=1;
  }
  /* Cal AI shrinks / absorbed into MyFitnessPal (25–30s) */
  if(t>25){
    var at=clamp01((t-25)/5);
    var as=ss(at);
    // Cal AI shrinks down to floor
    G.calai.scale.y=Math.max(0.001,1-as);
    G.calai.scale.x=1-as*0.3;
    G.calai.scale.z=1-as*0.3;
    // Cal AI body turns blue (MFP color) as it's absorbed
    if(G.calai._body)G.calai._body.material.color.copy(new THREE.Color('#00E676')).lerp(new THREE.Color('#0080FF'),as);
    // MyFitnessPal grows bigger — absorbing Cal AI
    G.mfp.scale.y=1+as*0.6;
    G.mfp.scale.x=1+as*0.15;
    G.mfp.scale.z=1+as*0.15;
  }

  /* Progressive background buildings */
  PB.forEach(function(pb){
    if(t>pb.st){pb.group.scale.y=eOB(clamp01((t-pb.st)/pb.dur))}
  });
}

/* ─── RENDER LOOP ─── */
function animate(){
  requestAnimationFrame(animate);
  var dt=clk.getDelta(),el=clk.getElapsedTime();

  if(!sT)sT=el;
  var ct=Math.min((el-sT)/CD,1.0);
  var cs=cLerp(KF,ct);
  camera.position.set(cs.p[0],cs.p[1],cs.p[2]);
  camera.lookAt(cs.l[0],cs.l[1],cs.l[2]);

  updateStory(el-sT);

  // Cars — skip over building footprints
  cars.forEach(function(c){
    var p=c._p;
    if(p.a==='x'){
      c.position.x+=p.d*p.s;
      if(Math.abs(c.position.x)>100)c.position.x=-100*p.d;
      // Skip building zones on this road (z ≈ p.z)
      Object.keys(CO).forEach(function(k){
        var b=CO[k],bx3=b.pos[0],bz3=b.pos[2],bw=b.w||10,bd=b.d||10;
        if(Math.abs(p.z-bz3)<bd/2+3){
          if(Math.abs(c.position.x-bx3)<bw/2+2) c.position.x=bx3+(bw/2+2.5)*p.d;
        }
      });
    }else{
      c.position.z+=p.d*p.s;
      if(Math.abs(c.position.z)>100)c.position.z=-100*p.d;
      Object.keys(CO).forEach(function(k){
        var b=CO[k],bx3=b.pos[0],bz3=b.pos[2],bw=b.w||10,bd=b.d||10;
        if(Math.abs(p.x-bx3)<bw/2+3){
          if(Math.abs(c.position.z-bz3)<bd/2+2) c.position.z=bz3+(bd/2+2.5)*p.d;
        }
      });
    }
  });

  // Helicopter
  hA+=dt*0.15;
  heli.position.set(Math.sin(hA)*42,38+Math.sin(el*0.4)*2,Math.cos(hA)*42-5);
  heli.rotation.y=Math.atan2(Math.cos(hA),-Math.sin(hA));
  heli.children.forEach(function(c){if(c._rotor)c.rotation.y+=0.3;if(c._tRotor)c.rotation.x+=0.4});

  // Blink
  blT+=dt;
  if(blT>0.85){blT=0;
    function blinkKids(obj){obj.children.forEach(function(c){if(c._blink)c.material.color.setHex(c.material.color.getHex()===0xff2222?0x1a0000:0xff2222);if(c.children&&c.children.length)blinkKids(c)})}
    Object.keys(G).forEach(function(k){blinkKids(G[k])});
    if(typeof mrBeastGroup!=='undefined')blinkKids(mrBeastGroup);
    robots.forEach(function(r){blinkKids(r)});
  }

  // Robot idle animation
  robots.forEach(function(r,i){
    r.position.y=Math.sin(el*1.5+i*1.7)*0.15;
    r.rotation.y=Math.sin(el*0.4+i*2)*0.3;
    // Head look-around (child index 1 = head)
    if(r.children[1])r.children[1].rotation.y=Math.sin(el*0.8+i)*0.4;
  });

  tLight.intensity=1.4+Math.sin(el*1.2)*0.3;

  renderer.render(scene,camera);
}
animate();

/* ─── RESIZE ─── */
addEventListener('resize',function(){
  var w=innerWidth,h=innerHeight;
  renderer.setSize(w,h);var a=w/h;
  camera.left=-VS*a;camera.right=VS*a;
  camera.updateProjectionMatrix();
});
</script>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Silicon Valley — The Remix</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

html, body {
  width: 100%; height: 100%;
  overflow: hidden;
  background: #060318;
  font-family: 'Helvetica Neue', Arial, sans-serif;
}

/* ── Sky ── */
#sky {
  position: fixed; inset: 0; z-index: 0;
  background: linear-gradient(180deg,
    #060318  0%,
    #0e0c50 18%,
    #3d1060 42%,
    #8c3840 62%,
    #d45e1e 78%,
    #f5a520 90%,
    #f8c85a 100%
  );
}

/* ── Sun glow at horizon ── */
#sun-glow {
  position: fixed;
  bottom: 90px; left: 50%;
  transform: translateX(-50%);
  width: 480px; height: 220px;
  background: radial-gradient(ellipse, rgba(255,170,30,0.5) 0%, rgba(255,90,0,0.15) 50%, transparent 70%);
  z-index: 1;
  pointer-events: none;
}

/* ── Stars canvas ── */
#stars { position: fixed; inset: 0; z-index: 2; pointer-events: none; }

/* ── Scene wrapper ── */
#wrapper {
  position: fixed; inset: 0;
  overflow: hidden; z-index: 3;
}

/* ── The wide panoramic scene ── */
#scene {
  position: absolute;
  bottom: 0; left: 0;
  height: 100%;
  display: flex;
  align-items: flex-end;
  padding-bottom: 85px;
  padding-left: 90px;
  padding-right: 250px;
  gap: 14px;
  width: max-content;
  will-change: transform;
}

/* ── Ground ── */
#ground {
  position: fixed; bottom: 0; left: 0; right: 0;
  height: 125px; z-index: 8;
  background: linear-gradient(180deg, #9e7840 0%, #6a4820 100%);
}

/* ── Road ── */
#road {
  position: fixed; bottom: 0; left: 0; right: 0;
  height: 72px; z-index: 9;
  background: #1c1c1c;
  border-top: 3px solid #2e2e2e;
  overflow: hidden;
}

#road-line {
  position: absolute;
  top: 50%; left: 0; right: 0; height: 5px;
  background: repeating-linear-gradient(
    90deg,
    #d4a017 0, #d4a017 44px,
    transparent 44px, transparent 88px
  );
  transform: translateY(-50%);
  animation: roadMove 0.75s linear infinite;
}

@keyframes roadMove {
  from { background-position-x: 0; }
  to   { background-position-x: -88px; }
}

/* ── Building base ── */
.building {
  flex-shrink: 0;
  position: relative;
  border-radius: 3px 3px 0 0;
  overflow: visible;
}

/* Window grid overlay */
.b-win-grid {
  position: absolute; inset: 0;
  background-image:
    repeating-linear-gradient(transparent, transparent 13px, rgba(0,0,0,0.18) 13px, rgba(0,0,0,0.18) 14px),
    repeating-linear-gradient(90deg, transparent, transparent 13px, rgba(0,0,0,0.18) 13px, rgba(0,0,0,0.18) 14px);
  z-index: 1;
  border-radius: 3px 3px 0 0;
}

/* Lit windows via canvas sits at z-index 2 */

/* ── Logo box ── */
.logo-box {
  position: absolute;
  top: 14px; left: 50%;
  transform: translateX(-50%);
  width: 64%; z-index: 10;
}
.logo-box svg { width: 100%; height: auto; display: block; }

/* ── Company name label ── */
.b-name {
  position: absolute; bottom: 9px;
  left: 0; right: 0;
  text-align: center;
  font-size: 7.5px; font-weight: 700;
  letter-spacing: 2.2px; text-transform: uppercase;
  color: rgba(255,255,255,0.32);
  z-index: 10;
}

/* ── Rooftop antenna ── */
.antenna {
  position: absolute; top: 0; left: 50%;
  transform: translate(-50%, -100%);
  width: 2px;
  background: linear-gradient(to top, rgba(180,180,200,0.5), transparent);
  z-index: 5;
}

/* ── Palm tree ── */
.palm { flex-shrink: 0; align-self: flex-end; }

/* ── Vignette overlay ── */
#vignette {
  position: fixed; inset: 0;
  background: radial-gradient(ellipse at 50% 55%, transparent 42%, rgba(0,0,0,0.78) 100%);
  z-index: 70; pointer-events: none;
}

/* ── Scanlines ── */
#scanlines {
  position: fixed; inset: 0;
  background: repeating-linear-gradient(
    transparent, transparent 2px,
    rgba(0,0,0,0.04) 2px, rgba(0,0,0,0.04) 4px
  );
  z-index: 75; pointer-events: none;
}

/* ── Title card ── */
#title-card {
  position: fixed; inset: 0;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  z-index: 90; pointer-events: none;
  animation: titleShow 7.5s ease-in-out 1s both;
}

@keyframes titleShow {
  0%   { opacity: 0; transform: scale(0.93) translateY(12px); }
  13%  { opacity: 1; transform: scale(1) translateY(0); }
  72%  { opacity: 1; transform: scale(1); }
  100% { opacity: 0; transform: scale(1.04) translateY(-6px); }
}

#title-main {
  font-size: clamp(36px, 6.8vw, 92px);
  font-weight: 900; color: #fff;
  letter-spacing: 0.24em; text-transform: uppercase;
  text-shadow:
    0 0 80px rgba(255,130,30,0.7),
    0 0 160px rgba(255,80,0,0.3),
    0 3px 24px rgba(0,0,0,0.7);
}

#title-sub {
  margin-top: 12px;
  font-size: clamp(10px, 1.3vw, 17px);
  color: rgba(255,215,110,0.9);
  letter-spacing: 0.55em; font-weight: 300;
  text-shadow: 0 0 30px rgba(255,160,40,0.5);
}

/* Replay button (shows after animation) */
#replay-btn {
  position: fixed; bottom: 30px; right: 30px;
  z-index: 100;
  background: rgba(255,255,255,0.12);
  border: 1px solid rgba(255,255,255,0.25);
  color: rgba(255,255,255,0.7);
  font-size: 12px; font-weight: 600;
  letter-spacing: 2px; text-transform: uppercase;
  padding: 10px 22px; border-radius: 4px;
  cursor: pointer;
  opacity: 0;
  animation: btnFadeIn 1s ease 54s forwards;
  transition: all 0.2s;
}
#replay-btn:hover { background: rgba(255,255,255,0.22); color: white; }
@keyframes btnFadeIn { to { opacity: 1; } }
</style>
</head>

/* ══════════════════════════════════════════
   STAR CANVAS
══════════════════════════════════════════ */
(function initStars() {
  const cvs = document.getElementById('stars');
  cvs.width  = window.innerWidth;
  cvs.height = window.innerHeight;
  const ctx = cvs.getContext('2d');

  for (let i = 0; i < 160; i++) {
    const x = Math.random() * cvs.width;
    const y = Math.random() * cvs.height * 0.52;
    const r = Math.random() * 1.5 + 0.2;
    const a = Math.random() * 0.65 + 0.25;
    ctx.beginPath();
    ctx.arc(x, y, r, 0, 2 * Math.PI);
    ctx.fillStyle = `rgba(255,255,255,${a.toFixed(2)})`;
    ctx.fill();
  }

  // Twinkling via CSS animation on a second canvas overlay would be complex;
  // instead we randomly toggle some star opacities with JS
  setInterval(() => {
    const x = Math.random() * cvs.width;
    const y = Math.random() * cvs.height * 0.52;
    const r = Math.random() * 1.3 + 0.3;
    ctx.clearRect(x - 3, y - 3, 6, 6);
    const a = Math.random() * 0.7 + 0.1;
    ctx.beginPath();
    ctx.arc(x, y, r, 0, 2 * Math.PI);
    ctx.fillStyle = `rgba(255,255,255,${a.toFixed(2)})`;
    ctx.fill();
  }, 80);
})();

/* ══════════════════════════════════════════
   LIT-WINDOW CANVAS GENERATOR
══════════════════════════════════════════ */
function makeLitWindows(bw, bh, cols, rows) {
  const cvs = document.createElement('canvas');
  cvs.width  = bw;
  cvs.height = bh;
  cvs.style.cssText = 'position:absolute;inset:0;z-index:2;pointer-events:none;';
  const ctx  = cvs.getContext('2d');
  const cw   = bw / cols;
  const rh   = bh / rows;

  for (let r = 0; r < rows; r++) {
    for (let c = 0; c < cols; c++) {
      if (Math.random() < 0.28) {
        const alpha = 0.35 + Math.random() * 0.45;
        const warm  = 140 + Math.floor(Math.random() * 115);
        ctx.fillStyle = `rgba(255, 255, ${warm}, ${alpha.toFixed(2)})`;
        ctx.fillRect(c * cw + 2, r * rh + 2, cw - 4, rh - 4);
      }
    }
  }

  // Randomly light up a few windows to simulate occupancy changes
  setInterval(() => {
    const c = Math.floor(Math.random() * cols);
    const r = Math.floor(Math.random() * rows);
    ctx.clearRect(c * cw + 2, r * rh + 2, cw - 4, rh - 4);
    if (Math.random() < 0.35) {
      const alpha = 0.35 + Math.random() * 0.45;
      const warm  = 140 + Math.floor(Math.random() * 115);
      ctx.fillStyle = `rgba(255, 255, ${warm}, ${alpha.toFixed(2)})`;
      ctx.fillRect(c * cw + 2, r * rh + 2, cw - 4, rh - 4);
    }
  }, 600 + Math.random() * 800);

  return cvs;
}

   BUILDING FACTORY
══════════════════════════════════════════ */
function makeBuilding(co) {
  const el = document.createElement('div');
  el.className = 'building';
  el.setAttribute('title', co.name);
  el.style.cssText = `width:${co.w}px; height:${co.h}px; background:${co.color};`;

  // Window grid overlay
  const wg = document.createElement('div');
  wg.className = 'b-win-grid';
  el.appendChild(wg);

  // Lit windows canvas
  el.appendChild(makeLitWindows(co.w, co.h, co.wcols, co.wrows));

  // Logo
  const lb = document.createElement('div');
  lb.className = 'logo-box';
  lb.innerHTML = co.logo;
  el.appendChild(lb);

  // Company name
  const nm = document.createElement('div');
  nm.className = 'b-name';
  nm.textContent = co.name;
  el.appendChild(nm);

  // Antenna
  if (co.antenna) {
    const ant = document.createElement('div');
    ant.className = 'antenna';
    ant.style.height = co.antenna + 'px';
    el.appendChild(ant);
  }

  return el;
}

/* ══════════════════════════════════════════
   ASSEMBLE SCENE
══════════════════════════════════════════ */
(function buildScene() {
  const scene = document.getElementById('scene');

  // Palm cluster positions (indices after which to insert a palm)
  const palmAfter = new Set([0, 3, 6, 8, 11, 14, 16]);

  // Opening palm
  scene.appendChild(makePalm(148 + Math.random() * 28 | 0));

  COMPANIES.forEach((co, i) => {
    scene.appendChild(makeBuilding(co));
    if (palmAfter.has(i)) {
      scene.appendChild(makePalm(115 + Math.random() * 55 | 0));
    }
  });

  // Closing palm cluster
  scene.appendChild(makePalm(130));
  scene.appendChild(makePalm(160));

  // ── Compute pan distance and kick off animation
  requestAnimationFrame(() => {
    const totalW = scene.scrollWidth;
    const vw     = window.innerWidth;
    const dist   = Math.max(0, totalW - vw + 10);
    const dur    = 52; // seconds

    const kf = document.createElement('style');
    kf.textContent = `
      @keyframes scenePan {
        0%   { transform: translateX(0); }
        100% { transform: translateX(-${dist}px); }
      }`;
    document.head.appendChild(kf);

    scene.style.animation = `scenePan ${dur}s cubic-bezier(0.2, 0, 0.8, 1) 1.8s forwards`;
  });
})();
</script>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My First Million — The Companies</title>
<style>
/* ═══════════════════════════════════════════════════════
   RESET & BASE
═══════════════════════════════════════════════════════ */
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 100%; height: 100%; overflow: hidden; background: #06030f;
  font-family: 'Helvetica Neue', Arial, sans-serif; }

/* ═══════════════════════════════════════════════════════
   SKY
═══════════════════════════════════════════════════════ */
#sky {
  position: fixed; inset: 0; z-index: 0;
  background: linear-gradient(180deg,
    #060318  0%, #0d0b48 20%, #3d1060 44%,
    #8c3840 63%, #d45e1e 78%, #f5a520 91%, #f8c85a 100%);
}
#sun-glow {
  position: fixed; bottom: 80px; left: 50%;
  transform: translateX(-50%);
  width: 600px; height: 260px;
  background: radial-gradient(ellipse, rgba(255,165,28,.55) 0%,
    rgba(255,90,0,.12) 55%, transparent 70%);
  z-index: 1; pointer-events: none;
}
#stars-cvs { position: fixed; inset: 0; z-index: 2; pointer-events: none; }
#clouds    { position: fixed; top: 0; left: 0; width: 100%; height: 55%;
  z-index: 3; pointer-events: none; overflow: hidden; }

/* ═══════════════════════════════════════════════════════
   SCENE WRAPPER (contains all three parallax layers)
═══════════════════════════════════════════════════════ */
#scene-wrapper {
  position: fixed; inset: 0; overflow: hidden; z-index: 5;
}

/* ─ Shared layer styles ─ */
.p-layer {
  position: absolute; bottom: 0; left: 0;
  height: 100%; width: max-content;
  display: flex; align-items: flex-end;
  will-change: transform;
}

/* BG LAYER — small, hazy, 30% pan speed */
#layer-bg {
  padding-bottom: 95px; padding-left: 60px; padding-right: 200px; gap: 10px;
  filter: opacity(0.42) blur(1.4px) saturate(0.5);
  /* atmospheric perspective: everything looks slightly washed / desaturated */
}
/* Shift bg buildings up — they sit higher in the frame = look further away */
#layer-bg .building { transform: translateY(-52px); }
/* mountain/hills silhouette fixed between sky and layers */
#mountains {
  position: fixed; bottom: 108px; left: 0; right: 0; height: 220px;
  z-index: 4; pointer-events: none;
}

/* MID LAYER — main MFM buildings, 100% speed */
#layer-mid {
  padding-bottom: 90px; padding-left: 120px; padding-right: 300px; gap: 18px;
}

/* FG LAYER — street props, 130% speed */
#layer-fg {
  padding-bottom: 0; padding-left: 80px; padding-right: 200px; gap: 0;
  pointer-events: none;
}

/* ═══════════════════════════════════════════════════════
   GROUND & ROAD
═══════════════════════════════════════════════════════ */
#ground {
  position: fixed; bottom: 0; left: 0; right: 0; height: 130px;
  z-index: 10;
  background: linear-gradient(180deg, #9e7840 0%, #6a4820 100%);
}
#road {
  position: fixed; bottom: 0; left: 0; right: 0; height: 74px;
  z-index: 11; background: #1c1c1c; border-top: 3px solid #303030;
  overflow: hidden;
}
#road-dashes {
  position: absolute; top: 50%; left: 0; right: 0; height: 5px;
  background: repeating-linear-gradient(
    90deg, #d4a017 0, #d4a017 44px, transparent 44px, transparent 90px);
  transform: translateY(-50%);
  animation: dashMove .75s linear infinite;
}
@keyframes dashMove { to { background-position-x: -90px; } }

/* ═══════════════════════════════════════════════════════
   BUILDINGS
═══════════════════════════════════════════════════════ */
.building {
  flex-shrink: 0; position: relative;
  border-radius: 4px 4px 0 0; overflow: visible;
}

/* subtle edge + top highlight */
.building::before {
  content: ''; position: absolute; inset: 0;
  box-shadow: inset 1px 0 0 rgba(255,255,255,.06),
              inset -1px 0 0 rgba(255,255,255,.04),
              inset 0 1px 0 rgba(255,255,255,.09);
  border-radius: 3px 3px 0 0;
  z-index: 3; pointer-events: none;
}

/* window-grid overlay */
.b-grid {
  position: absolute; inset: 0; z-index: 1;
  background-image:
    repeating-linear-gradient(transparent,transparent 13px, rgba(0,0,0,.18) 13px, rgba(0,0,0,.18) 14px),
    repeating-linear-gradient(90deg,transparent,transparent 13px, rgba(0,0,0,.18) 13px, rgba(0,0,0,.18) 14px);
  border-radius: 4px 4px 0 0;
}

/* Logo area */
.b-logo {
  position: absolute; top: 14px; left: 50%; transform: translateX(-50%);
  width: 62%; z-index: 8;
}
.b-logo svg { width: 100%; height: auto; display: block; }

/* Company name */
.b-name {
  position: absolute; bottom: 10px; left: 0; right: 0;
  text-align: center; font-size: 8px; font-weight: 700;
  letter-spacing: 2.4px; text-transform: uppercase;
  color: rgba(255,255,255,.3); z-index: 8;
}

/* Antenna */
.antenna {
  position: absolute; top: 0; left: 50%;
  transform: translate(-50%, -100%);
  width: 2px; background: linear-gradient(to top, rgba(180,180,200,.5), transparent);
  z-index: 5;
}
.antenna::after {
  content: ''; position: absolute; top: 0; left: 50%;
  transform: translateX(-50%);
  width: 6px; height: 6px; border-radius: 50%;
  background: #ff4444;
  box-shadow: 0 0 6px #ff4444;
  animation: blink 1.8s ease-in-out infinite;
}
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:.2} }

/* Palm tree */
.palm { flex-shrink: 0; align-self: flex-end; }

/* ═══════════════════════════════════════════════════════
   ACQUISITION ANIMATIONS
═══════════════════════════════════════════════════════ */

/* Acquisition wash overlay (color pours down over building) */
.acq-wash {
  position: absolute; top: 0; left: 0; right: 0; bottom: 0;
  transform-origin: top; transform: scaleY(0);
  transition: transform 1.8s cubic-bezier(.2,.8,.3,1);
  z-index: 6; border-radius: 4px 4px 0 0;
  opacity: .72;
}
.acq-wash.active { transform: scaleY(1); }

/* Acquisition badge that drops in from above */
.acq-badge {
  position: absolute; top: -56px; left: 50%; transform: translateX(-50%);
  background: linear-gradient(135deg, #f5c519, #e0a800);
  color: #000; padding: 3px 10px; border-radius: 3px;
  font-size: 9px; font-weight: 900; letter-spacing: 2px;
  white-space: nowrap; z-index: 12;
  opacity: 0; transition: top .8s ease .3s, opacity .5s ease .3s;
  box-shadow: 0 2px 8px rgba(0,0,0,.4);
}
.acq-badge.active { top: 8px; opacity: 1; }

/* Deal info that floats up */
.deal-float {
  position: absolute; left: 50%; transform: translateX(-50%);
  white-space: nowrap; font-size: 13px; font-weight: 900;
  color: #f5c519; text-shadow: 0 0 20px rgba(245,197,25,.8);
  letter-spacing: 1px; z-index: 15;
  opacity: 0; pointer-events: none;
}
.deal-float.active {
  animation: floatUp 3.5s ease forwards;
}
@keyframes floatUp {
  0%  { opacity: 0; transform: translateX(-50%) translateY(0); }
  15% { opacity: 1; }
  80% { opacity: 1; }
  100%{ opacity: 0; transform: translateX(-50%) translateY(-90px); }
}

/* Acquirer building "power surge" when it absorbs something */
.building.absorbing {
  animation: absorb 2.2s ease-in-out;
}
@keyframes absorb {
  0%   { filter: brightness(1); }
  30%  { filter: brightness(1.6) saturate(1.5); transform: scaleY(1.08); transform-origin: bottom; }
  65%  { filter: brightness(1.3); transform: scaleY(1.04); transform-origin: bottom; }
  100% { filter: brightness(1); transform: scaleY(1); transform-origin: bottom; }
}

/* ═══════════════════════════════════════════════════════
   INFO CARD (pops up as a company building enters view)
═══════════════════════════════════════════════════════ */
#info-card {
  position: fixed; bottom: 155px; left: 50px;
  background: rgba(5,5,18,.88); border: 1px solid rgba(255,255,255,.12);
  border-left: 3px solid #f5c519;
  padding: 14px 20px; border-radius: 4px;
  max-width: 340px; z-index: 80;
  opacity: 0; transform: translateY(10px);
  transition: opacity .5s ease, transform .5s ease;
  pointer-events: none; backdrop-filter: blur(12px);
}
#info-card.visible { opacity: 1; transform: translateY(0); }
#info-card .ic-name {
  font-size: 14px; font-weight: 900; letter-spacing: 1px;
  text-transform: uppercase; color: #f5c519; margin-bottom: 4px;
}
#info-card .ic-tagline {
  font-size: 11px; color: rgba(255,255,255,.75); line-height: 1.5; margin-bottom: 6px;
}
#info-card .ic-exit {
  font-size: 10px; font-weight: 700; color: #2DE1A8; letter-spacing: 1px;
}

/* ═══════════════════════════════════════════════════════
   TITLE CARD
═══════════════════════════════════════════════════════ */
#title-card {
  position: fixed; inset: 0;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  z-index: 90; pointer-events: none;
  animation: titleShow 8s ease-in-out 1.2s both;
}
@keyframes titleShow {
  0%   { opacity:0; transform:scale(.93) translateY(14px); }
  12%  { opacity:1; transform:scale(1) translateY(0); }
  70%  { opacity:1; }
  100% { opacity:0; transform:scale(1.04) translateY(-8px); }
}
#title-line1 {
  font-size: clamp(32px, 5.5vw, 76px); font-weight: 900;
  color: #fff; letter-spacing: .22em; text-transform: uppercase;
  text-shadow: 0 0 80px rgba(255,130,30,.7), 0 3px 24px rgba(0,0,0,.8);
}
#title-line2 {
  margin-top: 10px;
  font-size: clamp(10px, 1.1vw, 15px);
  color: rgba(255,215,100,.92); letter-spacing: .55em; font-weight: 300;
  text-shadow: 0 0 30px rgba(255,160,40,.5);
}
#title-line3 {
  margin-top: 6px;
  font-size: clamp(9px, .9vw, 13px);
  color: rgba(255,255,255,.4); letter-spacing: .4em; font-weight: 300;
}

/* ═══════════════════════════════════════════════════════
   VIGNETTE
═══════════════════════════════════════════════════════ */
#vignette {
  position: fixed; inset: 0;
  background: radial-gradient(ellipse at 50% 55%,transparent 38%,rgba(0,0,0,.8) 100%);
  z-index: 70; pointer-events: none;
}

/* ═══════════════════════════════════════════════════════
   PROGRESS DOT ROW (subtle progress indicator)
═══════════════════════════════════════════════════════ */
#progress-bar {
  position: fixed; bottom: 25px; left: 50%; transform: translateX(-50%);
  display: flex; gap: 7px; z-index: 85;
  opacity: 0; animation: fadeIn 1s ease 10s forwards;
}
@keyframes fadeIn { to { opacity: 1; } }
.pdot {
  width: 6px; height: 6px; border-radius: 50%;
  background: rgba(255,255,255,.25); transition: background .4s, transform .3s;
}
.pdot.current { background: #f5c519; transform: scale(1.4); }
.pdot.passed  { background: rgba(245,197,25,.4); }

/* Replay button */
#replay-btn {
  position: fixed; bottom: 28px; right: 32px; z-index: 95;
  background: rgba(255,255,255,.1); border: 1px solid rgba(255,255,255,.22);
  color: rgba(255,255,255,.7); font-size: 11px; font-weight: 700;
  letter-spacing: 2px; text-transform: uppercase;
  padding: 9px 20px; border-radius: 4px; cursor: pointer;
  opacity: 0; animation: fadeIn 1s ease 63s forwards; transition: all .2s;
}
#replay-btn:hover { background: rgba(255,255,255,.2); color: #fff; }

/* Scanlines */
#scanlines {
  position: fixed; inset: 0; z-index: 77; pointer-events: none;
  background: repeating-linear-gradient(transparent,transparent 2px,rgba(0,0,0,.04) 2px,rgba(0,0,0,.04) 4px);
}
</style>

/* ══════════════════════════════════════════════════════════
   LIT WINDOWS CANVAS
══════════════════════════════════════════════════════════ */
function makeLitCanvas(bw, bh, cols, rows) {
  const cvs = document.createElement('canvas');
  cvs.width = bw; cvs.height = bh;
  cvs.style.cssText = 'position:absolute;inset:0;z-index:2;pointer-events:none;';
  const ctx = cvs.getContext('2d');
  const cw = bw / cols, rh = bh / rows;

  for (let r = 0; r < rows; r++)
    for (let c = 0; c < cols; c++) {
      if (Math.random() < 0.27) {
        const alpha = 0.35 + Math.random() * 0.48;
        const warm  = 140 + Math.floor(Math.random() * 115);
        ctx.fillStyle = `rgba(255,255,${warm},${alpha.toFixed(2)})`;
        ctx.fillRect(c*cw+2, r*rh+2, cw-4, rh-4);
      }
    }

  // Random window flicker
  const flicker = () => {
    const c = Math.floor(Math.random()*cols), r = Math.floor(Math.random()*rows);
    ctx.clearRect(c*cw+2, r*rh+2, cw-4, rh-4);
    if (Math.random() < 0.32) {
      const a = 0.35 + Math.random()*.48;
      const w = 140 + Math.floor(Math.random()*115);
      ctx.fillStyle = `rgba(255,255,${w},${a.toFixed(2)})`;
      ctx.fillRect(c*cw+2, r*rh+2, cw-4, rh-4);
    }
    setTimeout(flicker, 500 + Math.random()*1200);
  };
  setTimeout(flicker, Math.random()*2000);
  return cvs;
}

/* ══════════════════════════════════════════════════════════
   PARALLAX PAN ENGINE
══════════════════════════════════════════════════════════ */
const PAN_DURATION = 65 * 1000; // 65 seconds
let startTime = null;
let acquisitionsFired = new Set();
let currentCompanyIdx = -1;

function easeInOut(t) { return (1 - Math.cos(t * Math.PI)) / 2; }

// Company X positions in mid layer (computed after DOM is ready)
let companyPositions = []; // x positions of building left edges

function computePositions() {
  // Use getBoundingClientRect at t=0 (before any translation) for accuracy
  const layerRect = midLayer.getBoundingClientRect();
  MFM_COMPANIES.forEach(co => {
    const el = document.getElementById('b-' + co.id);
    if (el) {
      const elRect = el.getBoundingClientRect();
      // x = position of building left edge inside the layer's natural coordinate space
      const x = elRect.left - layerRect.left;
      companyPositions.push({ co, x, w: co.w });
    }
  });
}

function animate(ts) {
  if (!startTime) startTime = ts;
  const elapsed = ts - startTime;
  const rawProg = Math.min(elapsed / PAN_DURATION, 1.0);
  const eased   = easeInOut(rawProg);

  const midW    = midLayer.scrollWidth;
  const vw      = window.innerWidth;
  const midMax  = Math.max(0, midW - vw);
  const midOff  = eased * midMax;

  const bgMax   = Math.max(0, bgLayer.scrollWidth  - vw);
  const fgMax   = Math.max(0, fgLayer.scrollWidth  - vw);

  bgLayer.style.transform  = `translateX(-${Math.min(midOff * 0.32, bgMax)}px)`;
  midLayer.style.transform = `translateX(-${midOff}px)`;
  fgLayer.style.transform  = `translateX(-${Math.min(midOff * 1.28, fgMax)}px)`;

  // Determine which company building is currently centered
  const viewCenter = midOff + vw / 2;
  let closestIdx = -1, closestDist = Infinity;
  companyPositions.forEach((p, i) => {
    const buildingCenter = p.x + p.w / 2;
    const dist = Math.abs(buildingCenter - viewCenter);
    if (dist < closestDist) { closestDist = dist; closestIdx = i; }
  });

  if (closestIdx !== currentCompanyIdx && closestDist < vw / 2.5) {
    currentCompanyIdx = closestIdx;
    showInfoCard(MFM_COMPANIES[closestIdx]);
    updateProgressDots(closestIdx);
  }

  // Trigger acquisition animations
  companyPositions.forEach((p, i) => {
    const co = p.co;
    if (!co.acquired || acquisitionsFired.has(co.id)) return;
    const buildingCenter = p.x + p.w / 2;
    const distFromCenter = Math.abs(buildingCenter - viewCenter);
    if (distFromCenter < 220) {
      acquisitionsFired.add(co.id);
      setTimeout(() => triggerAcquisition(co), 1200);
    }
  });

  if (rawProg < 1) requestAnimationFrame(animate);
}

      grad.setAttribute('x2',x2); grad.setAttribute('y2',y2);

                        <stop offset="100%" stop-color="#ff7a59" stop-opacity="0.4"/>`;
      defs.appendChild(grad);

      line.setAttribute('x1',x1); line.setAttribute('y1',y1);
      line.setAttribute('x2',x2); line.setAttribute('y2',y2);
      line.setAttribute('stroke','url(#beamGrad)');
      line.setAttribute('stroke-width','2.5');
      line.setAttribute('stroke-dasharray','10,5');
      line.style.cssText = 'opacity:0;transition:opacity .4s ease;';
      svg.appendChild(line);

      // Dollar-amount label along the beam

    const d = document.getElementById('pdot-' + i);
    if (!d) return;
    d.className = 'pdot' + (i === activeIdx ? ' current' : i < activeIdx ? ' passed' : '');
  });
}

/* ══════════════════════════════════════════════════════════
   BOOT
══════════════════════════════════════════════════════════ */
window.addEventListener('load', () => {
  // Brief delay then compute positions and start animation
  setTimeout(() => {
    computePositions();
    requestAnimationFrame(animate);
  }, 500);
});
</script>
</body>
</html>

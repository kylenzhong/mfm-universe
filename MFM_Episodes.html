    --text: #e8e8f0;

    --solo: #3a6fd8;

    --hot: #ff4d4d;
    --radius: 14px;

    position: relative;
    overflow: hidden;
  }
  header::before {
    content: '';
    position: absolute; inset: 0;
    background: radial-gradient(ellipse at 50% 0%, rgba(212,160,0,0.12) 0%, transparent 70%);
    pointer-events: none;
  }
  .header-nav {

  }
  .nav-btn {
    background: rgba(212,160,0,0.1); border: 1px solid var(--border);
    color: var(--muted); text-decoration: none; padding: 6px 14px;
    border-radius: 20px; font-size: 12px; transition: all .2s;
  }
  .nav-btn:hover { border-color: var(--gold); color: var(--gold); }
  .header-inner { max-width: 1200px; margin: 0 auto; position: relative; z-index: 1; }
  .header-title {
    font-family: 'Press Start 2P', monospace;
    font-size: clamp(16px, 3vw, 26px);
    color: var(--gold);
    text-shadow: 0 0 30px rgba(212,160,0,0.5);
    line-height: 1.4;
  }
  .header-sub { color: var(--muted); font-size: 14px; margin-top: 8px; }
  .header-stats {
    display: flex; gap: 20px; margin-top: 16px; flex-wrap: wrap;
  }
  .hstat {
    background: rgba(255,255,255,0.04); border: 1px solid var(--border);
    border-radius: 8px; padding: 8px 14px; text-align: center;
  }
  .hstat-val { color: var(--gold2); font-weight: 700; font-size: 20px; }
  .hstat-lbl { color: var(--muted); font-size: 11px; margin-top: 2px; }

  /* CONTROLS */
  .controls {
    position: sticky; top: 0; z-index: 50;
    background: rgba(13,13,26,0.97); border-bottom: 1px solid var(--border);
    padding: 14px 32px; backdrop-filter: blur(12px);
  }

  .search-wrap { flex: 1; min-width: 220px; position: relative; }
  .search-wrap input {
    width: 100%; background: var(--card); border: 1px solid var(--border);
    color: var(--text); padding: 10px 14px 10px 38px; border-radius: 8px;
    font-size: 14px; font-family: 'Inter', sans-serif; outline: none; transition: border .2s;
  }
  .search-wrap input:focus { border-color: var(--gold); }
  .search-wrap::before {
    content: '🔍'; position: absolute; left: 11px; top: 50%; transform: translateY(-50%);
    font-size: 14px; pointer-events: none;
  }
  .filter-btns { display: flex; gap: 6px; flex-wrap: wrap; }
  .fbtn {
    background: var(--card); border: 1px solid var(--border);
    color: var(--muted); padding: 7px 13px; border-radius: 20px;
    font-size: 12px; cursor: pointer; transition: all .2s; font-family: 'Inter', sans-serif;
  }
  .fbtn:hover { border-color: var(--gold); color: var(--text); }
  .fbtn.active { background: var(--gold); border-color: var(--gold); color: #000; font-weight: 700; }
  .sort-select {
    background: var(--card); border: 1px solid var(--border);
    color: var(--text); padding: 8px 12px; border-radius: 8px;
    font-size: 13px; font-family: 'Inter', sans-serif; outline: none; cursor: pointer;
  }

  /* GRID */
  .main { max-width: 1200px; margin: 0 auto; padding: 28px 32px; }
  .results-bar {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 18px; color: var(--muted); font-size: 13px;
  }
  .episode-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
    gap: 16px;
  }

  /* CARD */
  .ep-card {
    background: var(--card); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 20px;
    cursor: pointer; transition: all .2s; position: relative; overflow: hidden;
  }
  .ep-card::before {
    content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 3px;
    background: var(--accent, var(--gold));
  }
  .ep-card:hover { border-color: var(--gold); transform: translateY(-2px); box-shadow: 0 8px 30px rgba(0,0,0,0.4); }
  .ep-card-top { display: flex; align-items: flex-start; gap: 12px; margin-bottom: 12px; }
  .ep-num {
    background: rgba(212,160,0,0.12); color: var(--gold);
    font-size: 11px; font-weight: 700; padding: 4px 9px; border-radius: 5px;
    white-space: nowrap; flex-shrink: 0; margin-top: 2px;

  .ep-title { font-weight: 700; font-size: 15px; line-height: 1.35; color: var(--text); }
  .ep-meta { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; margin-bottom: 10px; }
  .ep-type {

  .ep-type.hot { background: rgba(255,77,77,0.2); color: #ff8888; }
  .ep-date { color: var(--muted); font-size: 12px; }
  .ep-guest {
    display: flex; align-items: center; gap: 6px;
    color: var(--gold2); font-size: 13px; font-weight: 600; margin-bottom: 10px;
  }
  .ep-guest-icon { font-size: 15px; }
  .ep-topics { display: flex; flex-wrap: wrap; gap: 5px; margin-bottom: 12px; }
  .ep-topic {
    background: rgba(255,255,255,0.05); border: 1px solid var(--border);
    color: var(--muted); font-size: 11px; padding: 3px 8px; border-radius: 10px;
  }
  .ep-insight {
    background: rgba(212,160,0,0.06); border-left: 2px solid var(--gold);
    padding: 8px 10px; border-radius: 0 6px 6px 0;
    color: #ccc; font-size: 12px; line-height: 1.5;
    display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
  }

  /* MODAL */
  .modal-overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,0.82); z-index: 200;
    align-items: center; justify-content: center; padding: 20px;

  .modal-overlay.open { display: flex; }
  .modal {
    background: var(--card2); border: 1px solid var(--border);
    border-radius: 18px; width: 100%; max-width: 720px;

    padding: 24px 28px 16px;

    background: linear-gradient(135deg, rgba(212,160,0,0.06) 0%, transparent 100%);

  .modal-ep-num { color: var(--gold); font-size: 12px; font-weight: 700; margin-bottom: 6px; }
  .modal-title { font-size: 20px; font-weight: 800; line-height: 1.3; margin-bottom: 10px; }

// ─── STATE ───────────────────────────────────────────────────────────────────
let activeFilter = 'all';
let activeModal = null;

// ─── INIT ────────────────────────────────────────────────────────────────────
window.onload = () => {
  updateStats();
  renderGrid();
};

function updateStats() {
  const total = EPISODES.length;
  const guest = EPISODES.filter(e => e.type === 'guest').length;
  const solo = EPISODES.filter(e => e.type === 'solo').length;
  document.getElementById('statTotal').textContent = total;
  document.getElementById('statGuest').textContent = guest;
  document.getElementById('statSolo').textContent = solo;
}

// ─── FILTER / SORT ───────────────────────────────────────────────────────────
function setFilter(f, btn) {
  activeFilter = f;
  document.querySelectorAll('.fbtn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderGrid();
}

function matchesFilter(ep) {
  if (activeFilter === 'all') return true;
  if (activeFilter === 'guest') return ep.type === 'guest';
  if (activeFilter === 'solo') return ep.type === 'solo';
  if (activeFilter === 'classic') return ep.classic === true;
  if (activeFilter === '2026') return ep.date.startsWith('2026');
  if (activeFilter === '2025') return ep.date.startsWith('2025');
  if (activeFilter === '2024') return ep.date.startsWith('2024');
  return true;
}

function matchesSearch(ep) {
  const q = document.getElementById('searchInput').value.toLowerCase().trim();
  if (!q) return true;
  const hay = [
    ep.title, ep.insight, ep.type,
    ...ep.guests, ...ep.topics,
    ...(ep.keyIdeas || []).map(k => k.title + ' ' + k.detail),
    ...(ep.quotes || [])
  ].join(' ').toLowerCase();
  return q.split(' ').every(word => hay.includes(word));
}

function sortEpisodes(arr) {
  const s = document.getElementById('sortSelect').value;
  return [...arr].sort((a, b) => {
    if (s === 'newest') return new Date(b.date) - new Date(a.date);
    if (s === 'oldest') return new Date(a.date) - new Date(b.date);
    if (s === 'num_desc') return (b.num || 0) - (a.num || 0);
    if (s === 'num_asc') return (a.num || 0) - (b.num || 0);
    return 0;
  });
}

// ─── RENDER GRID ─────────────────────────────────────────────────────────────
function renderGrid() {
  const filtered = sortEpisodes(EPISODES.filter(ep => matchesFilter(ep) && matchesSearch(ep)));
  const grid = document.getElementById('episodeGrid');
  const empty = document.getElementById('emptyState');
  const rc = document.getElementById('resultsCount');
  rc.textContent = `${filtered.length} episode${filtered.length !== 1 ? 's' : ''} shown`;

  if (filtered.length === 0) {
    grid.innerHTML = '';
    empty.style.display = 'block';
    return;
  }
  empty.style.display = 'none';

  grid.innerHTML = filtered.map(ep => {
    const typeLabel = ep.type === 'solo' ? 'Solo' : 'Guest';
    const typeClass = ep.type;
    const accentColor = ep.type === 'solo' ? 'var(--solo)' : ep.classic ? 'var(--gold)' : 'var(--guest)';
    const guestLine = ep.guests.length ? `<div class="ep-guest"><span class="ep-guest-icon">🎙</span>${ep.guests.join(', ')}</div>` : '';
    const topicsHtml = ep.topics.slice(0, 4).map(t => `<span class="ep-topic">${t}</span>`).join('');
    const insightPreview = ep.insight ? `<div class="ep-insight">${ep.insight}</div>` : '';

    return `
    <div class="ep-card" style="--accent:${accentColor}" onclick="openModal('${ep.title.replace(/'/g,"\\'")}')">
      <div class="ep-card-top">
        ${ep.num ? `<div class="ep-num">EP ${ep.num}</div>` : '<div class="ep-num">CLASSIC</div>'}
        <div class="ep-title">${ep.title}</div>
      </div>
      <div class="ep-meta">
        <span class="ep-type ${typeClass}">${typeLabel}</span>
        ${ep.classic ? '<span class="ep-type hot">🏆 Classic</span>' : ''}
        <span class="ep-date">${formatDate(ep.date)}</span>
      </div>
      ${guestLine}
      <div class="ep-topics">${topicsHtml}</div>
      ${insightPreview}
    </div>`;
  }).join('');
}

function formatDate(d) {
  const dt = new Date(d + 'T12:00:00');
  return dt.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
}

// ─── MODAL ───────────────────────────────────────────────────────────────────
function openModal(title) {
  const ep = EPISODES.find(e => e.title === title);
  if (!ep) return;
  activeModal = ep;

  document.getElementById('mEpNum').textContent = ep.num ? `Episode ${ep.num}` : 'Classic Episode';
  document.getElementById('mTitle').textContent = ep.title;
  document.getElementById('mGuest').textContent = ep.guests.length
    ? '🎙 ' + ep.guests.join(' · ')
    : '🧠 Sam Parr & Shaan Puri';

  const meta = document.getElementById('mMeta');
  const typeClass = ep.type === 'solo' ? 'solo' : 'guest';
  meta.innerHTML = `
    <span class="ep-type ${typeClass}">${ep.type === 'solo' ? 'Solo Episode' : 'Guest Episode'}</span>
    ${ep.classic ? '<span class="ep-type hot">🏆 Classic</span>' : ''}
    <span class="ep-date" style="font-size:13px">${formatDate(ep.date)}</span>
  `;

  const body = document.getElementById('mBody');
  let html = '';

  // Overview
  if (ep.insight) {
    html += `
    <div class="modal-section">
      <h3>Episode Overview</h3>
      <p>${ep.insight}</p>
    </div>`;
  }

  // Topics
  if (ep.topics.length) {
    html += `
    <div class="modal-section">
      <h3>Topics Covered</h3>
      <div class="modal-topics">${ep.topics.map(t => `<span class="modal-topic">${t}</span>`).join('')}</div>
    </div>`;
  }

  // Key Ideas
  if (ep.keyIdeas && ep.keyIdeas.length) {
    html += `<div class="modal-section"><h3>Key Ideas & Insights</h3>`;
    ep.keyIdeas.forEach(idea => {
      html += `
      <div class="insight-block">
        <div class="insight-title">💡 ${idea.title}</div>
        <p>${idea.detail}</p>
      </div>`;
    });
    html += `</div>`;
  }

  // Quotes
  if (ep.quotes && ep.quotes.length) {
    html += `<div class="modal-section"><h3>Best Quotes</h3>`;
    ep.quotes.forEach(q => {
      html += `<div class="quote-block"><p>"${q}"</p></div>`;
    });
    html += `</div>`;
  }

  // Listen
  html += `
  <div class="modal-section">
    <h3>Listen to this Episode</h3>
    <div class="listen-links">
      <a class="listen-link" href="https://www.mfmpod.com/episodes/" target="_blank">🌐 MFM Website</a>
      <a class="listen-link" href="https://open.spotify.com/show/3mliji9352UAk3XnWElnDV" target="_blank">🎵 Spotify</a>
      <a class="listen-link" href="https://podcasts.apple.com/us/podcast/my-first-million/id1469759170" target="_blank">🎧 Apple Podcasts</a>
      <a class="listen-link" href="https://www.youtube.com/@thesamshaanshow" target="_blank">📺 YouTube</a>
    </div>
  </div>`;

  // Guest profile link
  if (ep.guests.length) {
    html += `
    <div class="modal-section">
      <h3>Guest Profiles</h3>
      <div class="listen-links">
        ${ep.guests.map(g => `<a class="listen-link" href="MFM_Guest_Profiles.html" target="_blank">👤 ${g} Profile</a>`).join('')}
      </div>
    </div>`;
  }

  body.innerHTML = html;
  document.getElementById('modalOverlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeModal(e) {
  if (e.target === document.getElementById('modalOverlay')) closeModalBtn();
}
function closeModalBtn() {
  document.getElementById('modalOverlay').classList.remove('open');
  document.body.style.overflow = '';
}
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModalBtn(); });
</script>
</body>
